<html lang="ur">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp Panel Software KoSh</title>
<script src="/socket.io/socket.io.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI'}
body{background:#0e1621;color:#fff;padding:15px}
.container{max-width:800px;margin:auto}
.card{background:#17212b;padding:15px;margin:10px 0;border-radius:12px;box-shadow:0 2px 10px #0005}
h2{text-align:center;color:#5288c1;margin-bottom:15px}
h3{color:#6ab7ff;margin-bottom:10px}
input,button{width:100%;padding:12px;margin:6px 0;border:none;border-radius:8px;font-size:15px}
input{background:#242f3d;color:#fff}
button{background:#5288c1;color:#fff;font-weight:bold;cursor:pointer}
button:hover{background:#4179b1}
.btn-red{background:#c15252}
.btn-green{background:#52c17a}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.log{background:#000;height:250px;overflow-y:auto;padding:10px;border-radius:8px;font-size:13px}
.qr-box{text-align:center;margin:10px 0}
.qr-box img{background:#fff;padding:10px;border-radius:10px}
.status{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #2f3b4c}
</style>
</head>
<body>
<div class="container">
<h2>🤖 WhatsApp Vote Master Panel</h2>

<div class="card">
<h3>📊 Status</h3>
<div id="statusBox">Loading...</div>
<button class="btn-green" onclick="refreshList()">🔄 Refresh</button>
</div>

<div class="card">
<h3>➕ Add Bot</h3>
<input id="botId" placeholder="Bot ID: 1">
<input id="botName" placeholder="Bot Name: Bot-1">
<div class="grid">
<button onclick="addSession()">Add Bot</button>
<button onclick="getQR()">Get QR</button>
</div>
</div>

<div class="card">
<h3>🔑 Session ID Login</h3>
<input id="sId" placeholder="Bot ID: 1">
<input id="sessionId" placeholder="KnightBot!H4sIAAAA...">
<div class="grid">
<button onclick="loginSession()">Login</button>
<button onclick="extractSession()">Extract</button>
</div>
<div id="extractResult" style="word-break:break-all;color:#6ab7ff;margin-top:10px"></div>
</div>

<div class="card">
<h3>🗳️ Vote Control</h3>
<input id="option" placeholder="Vote Option: 1">
<input id="link" placeholder="Group Invite Link">
<div class="grid">
<button onclick="setOption()">Set Option</button>
<button onclick="startVote()">Start Vote</button>
</div>
</div>

<div class="card">
<h3>🛠️ Tools</h3>
<div class="grid">
<button onclick="backup()">Backup</button>
<button class="btn-red" onclick="resetDB()">Reset DB</button>
</div>
</div>

<div class="card">
<h3>📜 Live Log</h3>
<div class="log" id="log"></div>
</div>

<div class="card">
<h3>📲 QR Code</h3>
<div id="qrBox" class="qr-box">QR یہاں آئے گا</div>
</div>

</div>

<script>
const socket = io();
const API = '/api';

function log(msg){
    document.getElementById('log').innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
    document.getElementById('log').scrollTop = 99999;
}

async function api(endpoint, data={}){
    let res = await fetch(API+endpoint, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
    let json = await res.json();
    log(json.msg);
    if(json.sessionId) document.getElementById('extractResult').innerText = json.sessionId;
}

function addSession(){ api('/addsession', {id:botId.value, name:botName.value}) }
function getQR(){ api('/qr', {id:botId.value}) }
function loginSession(){ api('/session', {id:sId.value, sessionId:sessionId.value}) }
function extractSession(){ api('/extract', {id:sId.value}) }
function setOption(){ api('/option', {option:option.value}) }
function startVote(){ api('/vote', {link:link.value}) }
function backup(){ api('/backup') }
function resetDB(){ if(confirm('Sure?')) api('/resetdb') }

async function refreshList(){
    let res = await fetch(API+'/list');
    let json = await res.json();
    document.getElementById('statusBox').innerHTML = `
        Total: ${json.total} | Online: ${json.online} | Option: ${json.option}<br><br>
        ${json.list.map(b=>`<div class="status"><span>${b.name}</span><span style="color:${b.status=='Online'?'#52c17a':'#c15252'}">${b.status}</span></div>`).join('')}
    `;
}

socket.on('log', msg=>log(msg));
socket.on('qr', data=>{
    document.getElementById('qrBox').innerHTML = `<h4>${data.id} QR</h4><img src="${data.qr}">`;
    log(`📲 QR for Bot-${data.id} generated`);
});
socket.on('updateList', ()=>refreshList());

refreshList();
</script>
</body>
    </html>
