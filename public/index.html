<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KoSh Vote Software</title><script src="/socket.io/socket.io.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI'}
body{background: linear-gradient(135deg, #0e1621 0%, #1a2a3a 100%);color:#fff;padding:15px;min-height:100vh}
.container{max-width:850px;margin:auto}
.header{text-align:center;padding:15px;margin-bottom:10px}
.header h1{font-size:28px;font-weight:900;background: linear-gradient(90deg, #00f2ff, #5288c1, #00f2ff);background-size: 200% auto;-webkit-background-clip: text;-webkit-text-fill-color: transparent;animation: shine 3s linear infinite;text-shadow: 0 0 15px #5288c1aa;}
.header p{color:#6ab7ff;font-size:12px;margin-top:5px}
@keyframes shine { to { background-position: 200% center; } }
.card{background:#17212bcc;padding:15px;margin:10px 0;border-radius:15px;box-shadow:0 0 20px #5288c133;border:1px solid #5288c144}
h3{color:#00f2ff;margin-bottom:10px}
input,button,select{width:100%;padding:12px;margin:6px 0;border:none;border-radius:10px;font-size:15px}
input,select{background:#242f3d;color:#fff;border:1px solid #2f3b4c}
button{background: linear-gradient(90deg, #5288c1, #00f2ff);color:#000;font-weight:bold;cursor:pointer}
.btn-red{background: linear-gradient(90deg, #c15252, #ff6b6b)}
.btn-green{background: linear-gradient(90deg, #52c17a, #2ecc71)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.log{background:#000;height:250px;overflow-y:auto;padding:10px;border-radius:10px;font-size:13px;border:1px solid #00f2ff33}
.qr-box{text-align:center;margin:10px 0}
.qr-box img{background:#fff;padding:10px;border-radius:10px}
.status{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #2f3b4c}
.footer{text-align:center;margin-top:15px;padding:10px;font-size:12px;color:#6ab7ff;border-top:1px solid #2f3b4c}
.footer b{color:#00f2ff}
</style>
</head>
<body>
<div class="container">
<div class="header"><h1>✨ KoSh Vote Software ✨</h1><p>Pro WhatsApp Auto Vote Panel</p></div>
<div class="card"><h3>📊 Status</h3><div id="statusBox">Loading...</div><button class="btn-green" onclick="refreshList()">🔄 Refresh</button></div>
<div class="card"><h3>➕ Add Bot</h3><input id="botId" placeholder="Bot ID: 1"><input id="botName" placeholder="Bot Name: Bot-1"><div class="grid"><button onclick="addSession()">Add Bot</button><button onclick="getQR()">Get QR</button></div></div>
<div class="card"><h3>🔑 Session ID Login</h3><input id="sId" placeholder="Bot ID: 1"><input id="sessionId" placeholder="KnightBot!H4sIAAAA..."><div class="grid"><button onclick="loginSession()">Login</button><button onclick="extractSession()">Extract</button></div><div id="extractResult" style="word-break:break-all;color:#00f2ff;margin-top:10px"></div></div>
<div class="card"><h3>🗳️ Vote Control</h3><select id="option"><option value="A">Option A</option><option value="B">Option B</option><option value="C">Option C</option><option value="D">Option D</option><option value="E">Option E</option></select><input id="link" placeholder="Group Invite Link"><div class="grid"><button onclick="setOption()">Set Option</button><button class="btn-green" onclick="startVote()">Start Vote</button></div><button class="btn-red" onclick="stopVote()">Stop Vote</button></div>
<div class="card"><h3>🛠️ Tools</h3><button class="btn-red" onclick="resetDB()">Reset DB</button></div>
<div class="card"><h3>📜 Live Log</h3><div class="log" id="log"></div></div>
<div class="card"><h3>📲 QR Code</h3><div id="qrBox" class="qr-box">QR یہاں آئے گا</div></div>
<div class="footer">Developed By <b>Aijaz KoSh</b> | © 2026 KoSh Software</div>
</div>
<script>
const socket = io(); const API = '/api';
function log(msg){ document.getElementById('log').innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`; document.getElementById('log').scrollTop = 99999; }
async function api(endpoint, data={}){ let res = await fetch(API+endpoint, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)}); let json = await res.json(); log(json.msg); if(json.sessionId) document.getElementById('extractResult').innerText = json.sessionId; }

function addSession(){ api('/addsession', {id:botId.value, name:botName.value}) }
function getQR(){ api('/qr', {id:botId.value}) }
function loginSession(){ api('/session', {id:sId.value, sessionId:sessionId.value}) }
function extractSession(){ api('/extract', {id:sId.value}) }
function setOption(){ api('/option', {option:option.value}) }
function startVote(){ api('/startvote', {link:link.value}) }
function stopVote(){ api('/stopvote') }
function resetDB(){ if(confirm('Sure?')) api('/resetdb') }

async function refreshList(){
    let res = await fetch(API+'/list'); let json = await res.json();
    document.getElementById('statusBox').innerHTML = `Total: ${json.total} | Online: ${json.online} | Option: ${json.option} | Status: ${json.active?'RUNNING':'STOP'}<br><br>${json.list.map(b=>`<div class="status"><span>${b.name}</span><span style="color:${b.status=='Online'?'#52c17a':'#c15252'}">${b.status}</span></div>`).join('')}`;
}
socket.on('log', msg=>log(msg)); 
socket.on('qr', data=>{ document.getElementById('qrBox').innerHTML = `<h4>Bot-${data.id} QR</h4><img src="${data.qr}">`; log(`📲 QR for Bot-${data.id}`); });
socket.on('updateList', ()=>refreshList()); 
refreshList();
</script>
</body>
</html>
