<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WhatsApp Panel</title>
<style>
body{background:#0e1621;color:#fff;font-family:Arial;padding:15px;text-align:center}
.card{background:#17212b;padding:15px;margin:10px 0;border-radius:10px}
input,button{width:90%;padding:12px;margin:6px 0;border:none;border-radius:8px}
button{background:#5288c1;color:#fff;font-weight:bold}
#qrimg{width:200px;height:200px;background:#fff;margin:10px auto}
</style>
</head>
<body>
<h2>🤖 WhatsApp Vote Panel</h2>
<div class="card">
<input id="botId" placeholder="Bot ID: 1">
<input id="botName" placeholder="Bot Name">
<button onclick="add()">Add Bot</button>
<button onclick="qr()">Get QR</button>
<img id="qrimg" style="display:none">
</div>
<div class="card">
<input id="link" placeholder="Group Link">
<button onclick="vote()">Start Vote</button>
</div>
<script>
async function api(url,data){ 
    let res=await fetch('/api'+url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}); 
    return res.json();
}
async function add(){ let r=await api('/addsession',{id:botId.value,name:botName.value}); alert(r.msg) }
async function qr(){ 
    let r=await api('/qr',{id:botId.value}); 
    if(r.qr){
        qrimg.src = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + encodeURIComponent(r.qr);
        qrimg.style.display='block';
    }
    alert(r.msg) 
}
async function vote(){ let r=await api('/vote',{link:link.value}); alert(r.msg) }
</script>
</body>
</html>
